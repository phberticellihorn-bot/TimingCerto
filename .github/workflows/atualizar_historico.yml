name: Atualizar Histórico de Preços

on:
  schedule:
    - cron: '0 8 1 * *'   # Todo dia 1° do mês às 8h UTC (5h Brasília)
  workflow_dispatch:        # Permite rodar manualmente

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências
        run: pip install selenium webdriver-manager

      - name: Rodar scraper de histórico
        run: python atualizar_historico.py

      - name: Rodar scraper de futuros B3
        run: python buscar_futuro_b3.py

      - name: Salvar arquivos no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/historico.json app/futuros_b3.json
          git diff --staged --quiet || git commit -m "Atualização automática $(date +'%m/%Y')"
          git push
