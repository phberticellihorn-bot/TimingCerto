name: Atualizar Futuros B3

on:
  schedule:
    - cron: '0 21 * * 1-5'   # Todo dia útil às 21h UTC (18h Brasília — após fechamento pregão)
  workflow_dispatch:           # Permite rodar manualmente

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências
        run: pip install selenium webdriver-manager

      - name: Rodar scraper de futuros B3
        run: python buscar_futuro_b3.py

      - name: Salvar futuros_b3.json no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add futuros_b3.json
          git diff --staged --quiet || git commit -m "Futuros B3 atualizados $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
