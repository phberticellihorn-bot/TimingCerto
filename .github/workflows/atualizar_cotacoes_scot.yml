name: Atualizar Cotações Scot

on:
  schedule:
    - cron: '44 2 * * *'   # Todo dia às 00:15 UTC (21:15 Brasília)
  workflow_dispatch:         # Permite rodar manualmente

jobs:
  atualizar:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Necessário para fazer git push

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências
        run: pip install selenium webdriver-manager

      - name: Rodar scraper Scot
        run: python buscar_cotacoes_scot.py

      - name: Salvar arquivo no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/cotacoes_scot.json
          git diff --staged --quiet || git commit -m "Cotações Scot $(date +'%d/%m/%Y')"
          git push
